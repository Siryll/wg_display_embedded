name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "widget_store.json"
      - "common/src/**"
      - "embedded_app/src/**"
      - "frontend/src/**"
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Jekyll site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Download firmware from latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release download --repo "Siryll/wg_display_embedded" --pattern firmware.bin --dir docs --clobber; then
            echo "Downloaded firmware.bin from Siryll/wg_display_embedded latest release"
          else
            echo "No firmware.bin release asset found in Siryll/wg_display_embedded; continuing with existing docs/firmware.bin if present"
          fi

      - name: Publish widget store file
        run: |
          cp widget_store.json docs/widget_store.json
          echo "Published docs/widget_store.json from repository root"

      - name: Setup stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Setup Rust ESP toolchain
        uses: esp-rs/xtensa-toolchain@v1.5
        with:
          default: true
          buildtargets: esp32s3
          ldproxy: false

      - name: Restore stable as default toolchain
        run: rustup default stable

      - name: Build Rust docs for common
        run: |
          cd common
          cargo doc --no-deps
          mkdir -p ../docs/rustdoc/common
          cp -r target/doc/* ../docs/rustdoc/common/

      - name: Build Rust docs for embedded_app
        run: |
          cd embedded_app
          cargo doc --no-deps --target xtensa-esp32s3-none-elf
          mkdir -p ../docs/rustdoc/embedded_app
          cp -r target/xtensa-esp32s3-none-elf/doc/* ../docs/rustdoc/embedded_app/

      - name: Build Rust docs for frontend
        run: |
          cd frontend
          cargo doc --no-deps --target wasm32-unknown-unknown
          mkdir -p ../docs/rustdoc/frontend
          cp -r target/wasm32-unknown-unknown/doc/* ../docs/rustdoc/frontend/

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
