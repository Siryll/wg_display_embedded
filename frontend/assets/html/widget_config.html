<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title id="widgetName">{{WIDGET_NAME}}</title>
    <link rel="stylesheet" type="text/css" href="/assets/css/bootstrap.css" />
</head>

<body style="padding: 20px;">
    <h1></h1>
    <form></form>
    <div id="res" class="alert"></div>
    <script type="text/javascript" src="/assets/js/jquery.min.js"></script>
    <script type="text/javascript" src="/assets/js/underscore.js"></script>
    <script type="text/javascript" src="/assets/js/jsonform.js"></script>
    <script type="text/javascript">
        let widgetName = $('#widgetName').text()
        let schema = fetch('/config_schema/' + encodeURI(widgetName))
            .then(response => response.json())
            .then(schema => {
                if (typeof schema === 'string') {
                    schema = JSON.parse(schema)
                }
                console.log(schema)
                $("h1").text(widgetName + " Configuration")
                $('form').jsonForm({
                    schema: schema,
                    validate: false,
                    onSubmit: async function (errors, values) {
                        if (errors) {
                            $('#res').html('<pre>' + JSON.stringify(errors) + '</pre>')
                        } else {
                            const payload = {
                                config: JSON.stringify(values)
                            }
                            try {
                                const response = await fetch('/widget_config/' + encodeURIComponent(widgetName), {
                                    method: 'POST',
                                    headers: {
                                        'Content-Type': 'application/json'
                                    },
                                    body: JSON.stringify(payload)
                                })

                                if (!response.ok) {
                                    const errorText = await response.text()
                                    throw new Error(errorText || ('HTTP ' + response.status))
                                }

                                window.location.href = '/'
                            } catch (error) {
                                $('#res')
                                    .addClass('alert-danger')
                                    .html('<pre>Failed to save config: ' + error + '</pre>')
                            }
                        }
                    }
                })
            })
            .catch(error => console.error(error))
    </script>
</body>

</html>
