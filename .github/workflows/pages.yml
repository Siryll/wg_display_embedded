name: Deploy GitHub Pages

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Jekyll site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Download firmware from latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release download --repo "Siryll/wg_display_embedded" --pattern firmware.bin --dir docs --clobber; then
            echo "Downloaded firmware.bin from Siryll/wg_display_embedded latest release"
          else
            echo "No firmware.bin release asset found in Siryll/wg_display_embedded; continuing with existing docs/firmware.bin if present"
          fi

      - name: Publish widget store file
        run: |
          cp widget_store.json docs/widget_store.json
          echo "Published docs/widget_store.json from repository root"

      - name: Resolve CI run ID
        id: ci-run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            echo "run_id=${{ github.event.workflow_run.id }}" >> $GITHUB_OUTPUT
          else
            RUN_ID=$(gh api "repos/${{ github.repository }}/actions/workflows/rust_ci.yml/runs" \
              --jq '[.workflow_runs[] | select(.conclusion == "success")] | first | .id')
            echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
          fi

      - name: Download rustdoc artifact
        uses: actions/download-artifact@v4
        with:
          name: rustdoc
          path: docs/rustdoc
          run-id: ${{ steps.ci-run.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
