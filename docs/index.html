<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WG Display — Web Installer</title>
    <script
      type="module"
      src="https://unpkg.com/esp-web-tools@10/dist/web/install-button.js?module"
    ></script>
    <style>
      :root {
        --accent: #e8b44b;
        --bg: #0d1117;
        --surface: #161b22;
        --border: #30363d;
        --text: #e6edf3;
        --muted: #8b949e;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica,
          Arial, sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 2.5rem 2rem;
        max-width: 480px;
        width: 100%;
        text-align: center;
      }
      .logo {
        font-size: 2.5rem;
        margin-bottom: 0.5rem;
      }
      h1 {
        font-size: 1.6rem;
        font-weight: 700;
        margin-bottom: 0.4rem;
      }
      .subtitle {
        color: var(--muted);
        font-size: 0.95rem;
        margin-bottom: 2rem;
        line-height: 1.5;
      }
      esp-web-install-button {
        --esp-tools-button-color: var(--accent);
        --esp-tools-button-text-color: #000;
        font-size: 1rem;
      }
      .requirements {
        margin-top: 2rem;
        padding-top: 1.5rem;
        border-top: 1px solid var(--border);
        text-align: left;
      }
      .requirements h2 {
        font-size: 0.85rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--muted);
        margin-bottom: 0.75rem;
      }
      .requirements ul {
        list-style: none;
        font-size: 0.9rem;
        color: var(--muted);
        line-height: 2;
      }
      .requirements ul li::before {
        content: "✓ ";
        color: var(--accent);
      }
      footer {
        margin-top: 2rem;
        font-size: 0.8rem;
        color: var(--muted);
      }
      footer a {
        color: var(--accent);
        text-decoration: none;
      }
      footer a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">📟</div>
      <h1>WG Display</h1>
      <p class="subtitle">
        Flash the latest WG Display firmware to your
        ESP32-S3-Box-3 directly from your browser — no drivers required.
      </p>

      <esp-web-install-button manifest="manifest.json">
        <button slot="activate">Install / Update Firmware</button>
      </esp-web-install-button>

      <div class="requirements">
        <h2>Requirements</h2>
        <ul>
          <li>Chrome or Edge browser (desktop)</li>
          <li>ESP32-S3-Box-3 connected via USB</li>
          <li>USB cable that supports data transfer</li>
        </ul>
      </div>
    </div>

    <footer>
      <a href="https://github.com/Siryll/wg_display_embedded">View source on GitHub</a>
    </footer>
  </body>
</html>
